<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ 'Ekle' if action=='add' else 'Güncelle' }} Kullanıcı</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="p-4">
    <div class="container">
      <h1>{{ 'Kullanıcı Ekle' if action=='add' else 'Kullanıcı Güncelle' }}</h1>
      <form method="post">
        {% if action=='add' %}
        <div class="mb-3">
          <label class="form-label">CN (Ad Soyad)</label>
          <input name="cn" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label">OU (Alt OU örn: IT)</label>
          <input name="ou" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label">sAMAccountName</label>
          <input name="sAMAccountName" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label">Mail</label>
          <input name="mail" class="form-control">
        </div>
        <button class="btn btn-primary">Ekle</button>
        {% else %}
        <input type="hidden" name="dn" value="{{dn}}">
        <div class="mb-3">
          <label class="form-label">Mail</label>
          <input name="mail" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label">Title</label>
          <input name="title" class="form-control">
        </div>
        <button class="btn btn-primary">Güncelle</button>
        {% endif %}
        <a class="btn btn-secondary" href="/">Geri</a>
      </form>
    </div>
  </body>
  </html>
