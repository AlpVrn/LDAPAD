<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kullanıcı Ekle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="p-4">
    <div class="container">
      <h1>Kullanıcı Ekle</h1>
      <form method="post">
        <div class="mb-3">
          <label class="form-label">CN (Ad Soyad)</label>
          <input name="cn" id="cn" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">OU / Konteyner</label>
          {% if ous %}
          <select name="ou_select" id="ou_select" class="form-select mb-2" onchange="ouSecimDegisti()">
            <option value="">-- Mevcut OU seç --</option>
            {% for ou_dn in ous %}
            <option value="{{ ou_dn }}">{{ ou_dn }}</option>
            {% endfor %}
            <option value="manuel">-- Manuel gir --</option>
          </select>
          {% endif %}
          <input name="ou_text" id="ou_text" class="form-control d-none" placeholder="OU=AltSirket,OU=Sirket1 veya AltSirket, Sirket1">
          <div class="form-text" id="ou_helper">OU seçin veya manuel seçeneğinden kendi OU yolunuzu yazın.</div>
        </div>

        <div class="mb-3">
          <label class="form-label">sAMAccountName</label>
          <input name="sAMAccountName" id="sAMAccountName" class="form-control" required oninput="otomatikDoldur()">
        </div>

        <div class="mb-3">
          <label class="form-label">Mail</label>
          <input name="mail" id="mail" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Hesap Durumu</label>
          <div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="account_status" id="account_active" value="544" checked>
              <label class="form-check-label" for="account_active">Aktif (Enabled)</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="account_status" id="account_disabled" value="546">
              <label class="form-check-label" for="account_disabled">Pasif (Disabled)</label>
            </div>
          </div>
          <div class="form-text">Hesap durumu için Aktif/Pasif seçin.</div>
        </div>

        <button class="btn btn-primary" type="submit">Ekle</button>
        <a class="btn btn-secondary" href="/">Geri</a>
      </form>
    </div>

    <script>
    function ouSecimDegisti() {
      const secim = document.getElementById('ou_select').value;
      const input = document.getElementById('ou_text');
      const helper = document.getElementById('ou_helper');
      if (secim === 'manuel') {
        input.classList.remove('d-none');
        helper.textContent = 'OU yolunu manuel yazın. Örn: OU=AltSirket,OU=Sirket1';
      } else {
        input.classList.add('d-none');
        input.value = '';
        helper.textContent = 'OU seçin veya manuel seçeneğinden kendi OU yolunuzu yazın.';
      }
    }
    </script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
