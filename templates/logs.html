<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>İşlem Logları</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="p-4">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="mb-0">İşlem Logları</h1>
        <a class="btn btn-secondary" href="/">Geri</a>
      </div>
      <div class="card shadow-sm">
        <div class="card-body p-0">
          <pre class="m-0 p-3" style="max-height:80vh;overflow-y:auto;font-size:0.8rem;">{% for line in lines %}{{ line }}{% endfor %}</pre>
        </div>
      </div>
    </div>
  </body>
</html>
